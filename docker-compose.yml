# =============================================================================
# Glide HIMS - Docker Compose Configuration
# Complete stack for on-premise deployment
# =============================================================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: glide-hims-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-glide_hims}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_DATABASE:-glide_hims}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-glide_hims}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glide-network

  # Backend API
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: glide-hims-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-glide_hims}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_DATABASE: ${DB_DATABASE:-glide_hims}
      # Application
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-me}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      # Deployment mode
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-on-premise}
      # License
      LICENSE_KEY: ${LICENSE_KEY:-}
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-https://license.itsolutionsuganda.com}
      # Phone home
      PHONE_HOME_ENABLED: ${PHONE_HOME_ENABLED:-true}
      PHONE_HOME_URL: ${PHONE_HOME_URL:-https://hmisdemo.itsolutionsuganda.com/api/phone-home}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - glide-network

  # Frontend Web UI
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_APP_NAME: ${APP_NAME:-Glide HIMS}
    container_name: glide-hims-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: /api
      HOSPITAL_NAME: ${HOSPITAL_NAME:-}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@itsolutionsuganda.com}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - glide-network

  # Redis Cache (optional, for production scaling)
  redis:
    image: redis:7-alpine
    container_name: glide-hims-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glide-network
    profiles:
      - full

# Volumes for persistent data
volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  redis_data:
    driver: local

# Network
networks:
  glide-network:
    driver: bridge
