# Glide-HIMS — local full-stack (PostgreSQL + Redis + backend + frontend).
#
# Images are built from the canonical per-package Dockerfiles
# (packages/backend/Dockerfile, packages/frontend/Dockerfile).
# For client deployments use docker-compose.hybrid.yml (cloud-connected)
# or docker-compose.standalone.yml (offline/SQLite).
#
# Role model (required for row-level security):
#   - POSTGRES_USER (owner)      -> DDL + migrations, bypasses RLS
#   - glide_hims_runtime         -> application connections, RLS enforced
#   The runtime role is created by deployment/db-init/10-rls-roles.sh on
#   first initialization of the postgres volume.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_OWNER_USER:-glide_hims_app}
      POSTGRES_PASSWORD: ${DB_OWNER_PASSWORD:-ChangeMeInProduction}
      POSTGRES_DB: ${DB_NAME:-glide_hims}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD:-ChangeMeInProductionToo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/db-init/10-rls-roles.sh:/docker-entrypoint-initdb.d/10-rls-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_OWNER_USER:-glide_hims_app} -d ${DB_NAME:-glide_hims}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot migration runner — connects as the OWNER role (DDL rights,
  # bypasses RLS for backfills), then exits. The backend waits for it.
  migrate:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    command: ["node", "node_modules/typeorm/cli.js", "migration:run", "-d", "dist/config/database.config.js"]
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_OWNER_USER:-glide_hims_app}
      DB_PASSWORD: ${DB_OWNER_PASSWORD:-ChangeMeInProduction}
      DB_NAME: ${DB_NAME:-glide_hims}
      DB_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      # App runs as the non-owner runtime role so RLS applies.
      DB_USERNAME: glide_hims_runtime
      DB_PASSWORD: ${DB_RUNTIME_PASSWORD:-ChangeMeInProductionToo}
      DB_NAME: ${DB_NAME:-glide_hims}
      DB_SSL: "false"
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-with-32-char-min}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production-with-32-char-min}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-}
      MFA_SALT: ${MFA_SALT:-}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-}
      PII_HASH_KEY: ${PII_HASH_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
