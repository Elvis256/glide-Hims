# Role model (required for row-level security):
#   - ${DB_USER} (owner)   -> DDL + migrations (migrate service), bypasses RLS
#   - glide_hims_runtime   -> application connections, RLS enforced
# The runtime role is provisioned by deployment/db-init/10-rls-roles.sh on
# FIRST initialization of the postgres volume. For existing installs run it
# once manually: docker exec -i glide-hims-postgres sh < deployment/db-init/10-rls-roles.sh

services:
  # PostgreSQL Database - Core data storage
  postgres:
    image: postgres:15-alpine
    container_name: glide-hims-postgres
    shm_size: '512m'
    environment:
      POSTGRES_DB: glide_hims
      POSTGRES_USER: ${DB_USER:-hims_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeMeInProduction}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD:-ChangeMeInProductionToo}
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=256MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/standalone/init-db.sql:/docker-entrypoint-initdb.d/init.sql
      - ./deployment/db-init/10-rls-roles.sh:/docker-entrypoint-initdb.d/10-rls-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hims_admin}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - glide-network
    restart: unless-stopped

  # Redis Cache - Session storage & caching
  redis:
    image: redis:7-alpine
    container_name: glide-hims-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-ChangeMeInProduction}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-ChangeMeInProduction} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glide-network
    restart: unless-stopped

  # One-shot migration runner — connects as the OWNER role (DDL rights,
  # bypasses RLS for backfills), then exits. The backend waits for it.
  migrate:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: glide-hims-migrate
    command: ["node", "node_modules/typeorm/cli.js", "migration:run", "-d", "dist/config/database.config.js"]
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USER:-hims_admin}
      DB_PASSWORD: ${DB_PASSWORD:-ChangeMeInProduction}
      DB_NAME: glide_hims
      DB_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - glide-network
    restart: "no"

  # NestJS Backend API
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: glide-hims-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      # Individual DB vars required by main.ts startup checks.
      # App runs as the non-owner runtime role so RLS applies; migrations
      # run in the `migrate` service as the owner.
      DB_HOST: postgres
      DB_USERNAME: glide_hims_runtime
      DB_PASSWORD: ${DB_RUNTIME_PASSWORD:-ChangeMeInProductionToo}
      DB_NAME: glide_hims
      DATABASE_URL: postgresql://glide_hims_runtime:${DB_RUNTIME_PASSWORD:-ChangeMeInProductionToo}@postgres:5432/glide_hims
      REDIS_URL: redis://:${REDIS_PASSWORD:-ChangeMeInProduction}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ChangeMeInProduction}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-with-32-char-min}
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-${REFRESH_TOKEN_SECRET:-change-me-in-production-with-32-char-min}}
      REFRESH_TOKEN_EXPIRES_IN: 7d
      # Encryption keys (required in production by main.ts)
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-}
      PII_HASH_KEY: ${PII_HASH_KEY:-}
      LOG_LEVEL: info
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-hybrid}
      DB_SSL: "false"
      # License
      LICENSE_KEY: ${LICENSE_KEY:-}
      LICENSE_SECRET_KEY: ${LICENSE_SECRET_KEY:-}
      # Schema changes are applied via migrations — never use synchronize in production
      TYPEORM_SYNCHRONIZE: "false"
      CORS_ORIGINS: http://localhost:8080,https://${DOMAIN_NAME}
      API_URL: https://${DOMAIN_NAME}/api
      FRONTEND_URL: https://${DOMAIN_NAME}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # node-based check: curl/wget are not installed in the alpine image
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - glide-network
    restart: unless-stopped
    volumes:
      - ./packages/backend/logs:/app/logs

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: glide-hims-frontend
    environment:
      VITE_API_URL: https://${DOMAIN_NAME}/api
      VITE_API_TIMEOUT: 30000
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - glide-network
    restart: unless-stopped

  # Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    container_name: glide-hims-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - glide-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  glide-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
